# Swarm Configuration Example
# Copy to ~/.openclaw/swarm-config.yaml and customize with YOUR values
# 
# IMPORTANT: Replace ALL placeholder values (YOUR_*) with your actual configuration

swarm:
  name: "my-swarm"  # CHANGEME: Your swarm name
  description: "Production automation swarm"  # CHANGEME: Your description
  leader_node: "your-leader"  # CHANGEME: Your leader node name
  version: "1.0.0"

# Node definitions - REPLACE ALL VALUES BELOW
nodes:
  # Leader Node (typically your highest-spec machine)
  - name: "your-leader-name"  # e.g., "rock-5b", "desktop", "server"
    ip: "YOUR_LEADER_IP"  # CHANGEME: e.g., "192.168.1.10" or "127.0.0.1" if local only
    role: "leader"
    specs:
      ram_gb: 32  # CHANGEME: Your RAM
      storage_gb: 500  # CHANGEME: Your storage
      arch: "arm64"  # CHANGEME: arm64 or x86_64
    capabilities: 
      - orchestration
      - heavy_context
      - long_term_memory
      - preference_learning
    health_check_interval: 1800  # 30 minutes
    
  # GPU Worker Node (for local LLM inference)
  # OPTIONAL: Can use OpenRouter only if you don't have GPU
  - name: "your-gpu-node-name"  # CHANGEME: e.g., "omen", "workstation"
    ip: "YOUR_GPU_NODE_IP"  # CHANGEME: e.g., "192.168.1.20" or "10.0.0.5"
    role: "worker"
    specs:
      ram_gb: 16  # CHANGEME: GPU node RAM
      storage_gb: 1000  # CHANGEME: GPU node storage
      gpu: "RTX 3060"  # CHANGEME: Your GPU model (or remove if CPU-only)
      arch: "x86_64"  # CHANGEME: arm64 or x86_64
    capabilities:
      - cuda_inference  # Remove if no CUDA GPU
      - embeddings
      - ollama
      - heavy_compute
    max_concurrent_tasks: 4
    
  # Light Worker Node (optional, for lightweight tasks)
  # OPTIONAL: Can run with just leader + GPU worker
  - name: "your-pi-node-name"  # CHANGEME: e.g., "raspberry-pi"
    ip: "YOUR_WORKER_IP"  # CHANGEME: Worker node IP
    role: "worker"
    specs:
      ram_gb: 8  # CHANGEME: Light worker RAM
      storage_gb: 256  # CHANGEME: Light worker storage
      arch: "arm64"  # CHANGEME: architecture
    capabilities:
      - light_scripts
      - monitoring
      - health_checks
    max_concurrent_tasks: 8

# Backend configuration
backends:
  openrouter:
    enabled: true
    api_key: ${OPENROUTER_API_KEY}  # Set via environment variable
    default_model: "openrouter/moonshotai/kimi-k2.5"
    fallback_models:
      - "openrouter/moonshotai/kimi-k2.5"
      - "openrouter/openai/gpt-4o"
    timeout_seconds: 60
    max_retries: 3
    
  ollama:
    enabled: true  # Set to false if no local GPU
    # CHANGEME: Configure for YOUR setup
    # If Ollama is on the leader node: "http://127.0.0.1:11434"
    # If Ollama is on a worker node: "http://YOUR_GPU_IP:11434"
    endpoint: "http://YOUR_GPU_IP:11434"  # Example: "http://192.168.1.20:11434"
    default_model: "mistral:7b"  # Default for heavy reasoning
    vision_model: "llava:7b"  # For vision tasks
    fast_model: "llama3.2:3b"  # For quick responses
    timeout_seconds: 120

# Cost management
cost_management:
  daily_budget_usd: 5.00  # CHANGEME: Your daily budget
  monthly_budget_usd: 100.00  # CHANGEME: Your monthly budget
  fallback_threshold: 80  # % of budget before switching to local Ollama
  alert_channels: ["webchat"]  # CHANGEME: Your notification channels

# Versioning settings
versioning:
  registry_path: "~/.openclaw/skills/skill-versioning/registry/"
  shadow_results_path: "~/.openclaw/skills/skill-versioning/shadow_results/"
  min_shadow_runs: 50
  acceptance_threshold: 0.90
  auto_promote: false  # Manual promotion recommended for safety

# Preference learning - CHANGEME: Set to your username
preference_learning:
  user_id: "YOUR_USERNAME"  # e.g., "john", "alice"
  storage_path: "~/.openclaw/skills/skill-preference-learning/preferences/"
  confidence_decay_days: 30
  min_confidence_for_application: 0.4
  feedback_patterns_enabled: true

# Consensus/debate
consensus:
  enabled: true
  risk_threshold: 0.6
  min_confidence: 0.7
  personas:
    - conservative
    - pragmatic
    - innovative
  debate_timeout_seconds: 300

# Health monitoring
health:
  enabled: true
  check_interval_minutes: 30
  session_warning_threshold: 200
  session_critical_threshold: 500
  auto_cleanup_orphaned: true
  orphaned_age_days: 7

# Logging
logging:
  level: "INFO"
  file: "~/.openclaw/logs/swarm.log"
  max_size_mb: 100
  retention_days: 30
  
# Notifications - CHANGEME: Configure for your setup
notifications:
  enabled: true
  channels:
    webchat:
      target: "YOUR_USERNAME"  # CHANGEME
    email:
      smtp_server: "smtp.gmail.com"  # CHANGEME
      to: "your-email@example.com"  # CHANGEME
      from: "swarm@yourdomain.com"  # CHANGEME